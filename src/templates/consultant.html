<section class="vendor-hero consultant-hero">
  <div class="container">
    <div class="vendor-hero-inner">
      <div class="vendor-hero-main">
        <a href="/consultants" class="back-link">← All consultants</a>
        <div class="vendor-hero-heading">
          {{avatar}}
          <div>
            <span class="vendor-category">{{vendorLabel}} Expert{{tierBadgeInline}}</span>
            <h1 class="vendor-title">{{name}}</h1>
          </div>
        </div>
        <p class="vendor-desc">{{tagline}}</p>
        <div class="vendor-meta-row">
          {{serviceTags}}
        </div>
      </div>
      <div class="vendor-sidebar">
        <div class="vendor-info-card">
          {{sidebarRows}}
          {{ctaBlock}}
        </div>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <div class="container container-narrow">
    <div class="vendor-body consultant-body">
      {{content}}
    </div>
  </div>
</section>

<section class="section section-alt">
  <div class="container">
    <h2>Other {{vendorLabel}} Experts</h2>
    <div class="consultant-grid">
      {{relatedConsultants}}
    </div>
  </div>
</section>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{url}}">
  <meta property="og:image" content="https://weekcrm.com/images/logo.png">
  <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
  <link rel="alternate" type="application/rss+xml" title="WeekCRM" href="/rss.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css?v={{assetVersion}}">
</head>
<body class="{{bodyClass}}">

  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">WeekCRM</a>
      <nav class="nav" id="nav">
        <a href="/news" class="nav-link">News</a>
        <a href="/vendors" class="nav-link">Directory</a>
        <a href="/consultants" class="nav-link">Consultants</a>
        <a href="https://weekcrm.beehiiv.com" target="_blank" rel="noopener" class="nav-link">Newsletter</a>
      </nav>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main>
    {{body}}
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <a href="/" class="logo">WeekCRM</a>
        <p class="footer-tagline">CRM news without the noise.</p>
      </div>
      <div class="footer-links">
        <a href="/news">News</a>
        <a href="/vendors">Directory</a>
        <a href="/consultants">Consultants</a>
        <a href="/rss.xml">RSS</a>
      </div>
      <div class="footer-social">
        <a href="https://x.com/weekcrm" aria-label="X / Twitter" target="_blank" rel="noopener">X</a>
        <a href="https://www.linkedin.com/company/weekcrm/" aria-label="LinkedIn" target="_blank" rel="noopener">LinkedIn</a>
      </div>
      <p class="footer-copy">&copy; 2026 WeekCRM</p>
    </div>
  </footer>

  <script src="/assets/main.js"></script>
<script src="https://cdn.apitiny.net/scripts/v2.0/main.js" data-site-id="69de1b23eb244daa752db5b6" data-test-mode="false" async></script>
</body>
</html>

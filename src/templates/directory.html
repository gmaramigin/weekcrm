<section class="page-header">
  <div class="container">
    <h1>Vendor Directory</h1>
    <p class="page-subtitle">CRMs, helpdesks, integrations, and tools — with honest reviews and real trade-offs.</p>
  </div>
</section>

<!-- Ad placement -->
<section class="ad-section">
  <div class="container">
    <div class="ad-slot" id="tinyadz-directory">
      <span class="ad-label">Sponsor</span>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="directory-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="crm">CRM</button>
      <button class="filter-btn" data-filter="helpdesk">Helpdesk</button>
      <button class="filter-btn" data-filter="integration">Integration</button>
    </div>
    <div class="vendor-grid">
      {{vendorCards}}
    </div>
  </div>
</section>
